<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Page</title>
  </head>
  <body>
    <h1>Product Page</h1>
    <p>Welcome to the product page!</p>
    <form id="formSearch">
      <input type="text" name="name" id="productName" placeholder="Product Name" />
      <input type="submit" value="Search" />
    </form>
    <div id="resultsContainer"></div>
    <script>
  const form = document.getElementById("formSearch");
  const input = document.getElementById("productName");
  const resultsContainer = document.getElementById("resultsContainer");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = input.value.trim();
    if (!name) {
      resultsContainer.innerHTML = "<p>Please type a product name.</p>";
      return;
    }

    const url = `/items/search?name=${encodeURIComponent(name)}`;
    resultsContainer.innerHTML = `<p>Loading... (${url})</p>`;

    try {
      const response = await fetch(url);

      // show response status + raw text if something goes wrong
      if (!response.ok) {
        const text = await response.text();
        resultsContainer.innerHTML = `<pre>Request failed: ${response.status}\n${text}</pre>`;
        return;
      }

      const items = await response.json();

      if (!Array.isArray(items) || items.length === 0) {
        resultsContainer.innerHTML = "<p>No items found.</p>";
        return;
      }

      resultsContainer.innerHTML = `
        <h2>Search Results:</h2>
        <ul>${items.map((item) => `<li>${item.name}</li>`).join("")}</ul>
      `;
    } catch (err) {
      resultsContainer.innerHTML = `<pre>Error: ${err.message}</pre>`;
    }
  });
    </script>
  </body>
</html>
